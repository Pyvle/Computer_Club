services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=clubdb'
      - 'POSTGRES_PASSWORD=club'
      - 'POSTGRES_USER=club'
    ports:
      - '5433:5432'
  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'
  minio:
    image: 'minio/minio:latest'
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - 'MINIO_ROOT_USER=minioadmin'
      - 'MINIO_ROOT_PASSWORD=minioadmin'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
